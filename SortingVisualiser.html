<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sorting Visualizer & Bot with Speed Control</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f4f8fb; margin: 0; padding: 20px; }
    h1 { color: #1565c0; margin-bottom: 8px; }
    h2 { margin-top: 40px; color: #1565c0; }
    #bars { display: flex; align-items: flex-end; justify-content: center; height: 380px; border: 1px solid #bbb; background: white; margin: 20px 0; }
    .bar { width: 18px; margin: 2px; border-radius: 5px 5px 0 0; transition: height 0.2s, background-color 0.2s;}
    #controls { margin-bottom: 10px;}
    button, select { padding: 10px 18px; margin-right: 8px; border: none; border-radius: 6px; background: #1565c0; color: #fff; font-size: 15px; cursor: pointer;}
    button:hover, select:hover { background: #003c8f;}
    #speedControl {display: inline-block; margin: 0 10px;}
    #complexity, #colorLegend { margin-top: 10px; font-weight: 600;}
    #colorLegend span { display: inline-block; min-width: 40px; padding: 3px 10px; border-radius: 6px; margin-right: 10px;}
    .legend-default { background: #eee;}
    .legend-bubble { background: #23a9f0;}
    .legend-selection { background: #39b54a;}
    .legend-insertion { background: #ffb300;}
    .legend-merge { background: #a259e8;}
    .legend-quick { background: #fd4c4c;}
    .legend-pivot { background: #ce93d8;}
    .legend-partition { background: #d500f9;}
    .legend-sorted { background: #58ef7b;}
    /* Bot styles */
    #chatbot { background: #fff; border-radius: 10px; border: 1px solid #bbb; width: 60%; margin: 30px auto 0; max-height: 270px; overflow-y: auto; padding: 14px; }
    .chatuser, .chatbotmsg { padding: 8px 16px; max-width:75%; border-radius:8px; margin-bottom:9px;}
    .chatuser { background:#1565c0; color:white; text-align:right; float:right;}
    .chatbotmsg { background:#eee; color:#333; text-align:left; float:left;}
    #chatInput { width: 60%; padding: 9px; border-radius: 6px; border:1px solid #bbb;}
    #sendBtn { padding: 8px 16px; background: #39b54a;}
    #sendBtn:hover { background: #20632e;}
    @media (max-width:800px){#chatbot{width:95%;} #chatInput{width:95%;}}
  </style>
</head>
<body>
  <h1>Sorting Visualizer with Bot</h1>
  <div id="controls">
    <label for="algo">Algorithm:</label>
    <select id="algo">
      <option value="bubble">Bubble Sort</option>
      <option value="selection">Selection Sort</option>
      <option value="insertion">Insertion Sort</option>
      <option value="merge">Merge Sort</option>
      <option value="quick">Quick Sort</option>
    </select>
    <button id="runBtn">Run</button>
    <button id="genBtn">New Array</button>
    <span id="speedControl">
      <label for="speed">Speed:</label>
      <input type="range" id="speed" min="20" max="300" value="100" step="20">
      <span id="speedValue">Medium</span>
    </span>
  </div>
  <div id="colorLegend">
    <span class="legend-default">Default</span>
    <span class="legend-bubble">Bubble</span>
    <span class="legend-selection">Selection</span>
    <span class="legend-insertion">Insertion</span>
    <span class="legend-merge">Merge</span>
    <span class="legend-quick">Quick</span>
    <span class="legend-sorted">Sorted</span>
    <span class="legend-pivot">Pivot</span>
    <span class="legend-partition">Partition</span>
  </div>
  <div id="bars"></div>
  <div id="complexity"></div>

  <h2>Bot: Ask about Sorting!</h2>
  <div id="chatbot"></div>
  <input type="text" id="chatInput" placeholder="Ask about any sorting technique (e.g., Bubble Sort)">
  <button id="sendBtn">Send</button>

  <script>
    let array = [];
    const size = 32;
    let delay = 100;
    // Color settings
    const colours = {
      default: "#eee",
      bubble: "#23a9f0",
      selection: "#39b54a",
      insertion: "#ffb300",
      merge: "#a259e8",
      quick: "#fd4c4c",
      sorted: "#58ef7b",
      pivot: "#ce93d8",
      partition: "#d500f9"
    };
    function generateArray() {
      array = [];
      for(let i=0;i<size;i++)
        array.push(Math.floor(30 + Math.random()*300));
      drawBars();
      document.getElementById('complexity').textContent = "";
    }
    function drawBars(highlight={}, sorted=[]) {
      const bars = document.getElementById('bars');
      bars.innerHTML = '';
      array.forEach((val,idx) => {
        let bar = document.createElement('div');
        bar.className = 'bar';
        bar.style.height = val+"px";
        // Default colour
        bar.style.background = colours.default;
        // Sorted
        if(sorted.includes(idx)){
          bar.style.background = colours.sorted;
        }
        // Highlight & Algorithm color
        if(highlight[idx]){
          bar.style.background = highlight[idx];
        }
        bars.appendChild(bar);
      });
    }
    function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }
    // Bubble Sort Visualization
    async function bubbleSort(){
      let n = array.length;
      for(let i=0;i<n-1;i++){
        for(let j=0;j<n-i-1;j++){
          let highlight = {};
          highlight[j]=colours.bubble;
          highlight[j+1]=colours.bubble;
          drawBars(highlight);
          if(array[j]>array[j+1]){
            [array[j],array[j+1]]=[array[j+1],array[j]];
            drawBars(highlight);
          }
          await sleep(delay);
        }
      }
      drawBars({},Array.from(Array(n).keys()));
      showComplexity("Bubble Sort","O(n²)", "O(1)");
    }
    // Selection Sort Visualization
    async function selectionSort(){
      let n=array.length;
      for(let i=0;i<n;i++){
        let min=i;
        for(let j=i+1;j<n;j++){
          let highlight={};
          highlight[i]=colours.selection;
          highlight[j]=colours.selection;
          highlight[min]=colours.partition;
          drawBars(highlight);
          if(array[j]<array[min]) min=j;
          await sleep(delay);
        }
        [array[i],array[min]]=[array[min],array[i]];
      }
      drawBars({},Array.from(Array(n).keys()));
      showComplexity("Selection Sort","O(n²)", "O(1)");
    }
    // Insertion Sort
    async function insertionSort(){
      let n=array.length;
      for(let i=1;i<n;i++){
        let key=array[i],j=i-1;
        let highlight={}; highlight[i]=colours.insertion;
        while(j>=0&&array[j]>key){
          array[j+1]=array[j];
          highlight[j+1]=colours.insertion;
          drawBars(highlight);
          await sleep(delay);
          j--;
        }
        array[j+1]=key;
        drawBars(highlight);
        await sleep(delay);
      }
      drawBars({},Array.from(Array(n).keys()));
      showComplexity("Insertion Sort","O(n²)", "O(1)");
    }
    // Merge Sort
    async function mergeSort(start=0,end=array.length-1){
      if(start>=end) return;
      let mid = Math.floor((start+end)/2);
      await mergeSort(start,mid); await mergeSort(mid+1,end);
      await merge(start,mid,end);
      drawBars();
    }
    async function merge(start,mid,end){
      let left=array.slice(start,mid+1), right=array.slice(mid+1,end+1);
      let i=0,j=0,k=start;
      while(i<left.length&&j<right.length){
        let highlight={}; highlight[k]=colours.merge;
        array[k++] = (left[i]<=right[j]) ? left[i++] : right[j++];
        drawBars(highlight);
        await sleep(delay);
      }
      while(i<left.length){ array[k]=left[i++]; let highlight={}; highlight[k]=colours.merge; drawBars(highlight); await sleep(delay); k++;}
      while(j<right.length){ array[k]=right[j++]; let highlight={}; highlight[k]=colours.merge; drawBars(highlight); await sleep(delay); k++;}
    }
    // Quick Sort
    async function quickSort(start=0,end=array.length-1){
      if(start<end){
        let p = await partition(start,end);
        await quickSort(start,p-1);
        await quickSort(p+1,end);
      }
      drawBars();
    }
    async function partition(start,end){
      let pivot=array[end]; let i=start-1;
      for(let j=start;j<end;j++){
        let highlight={}; highlight[j]=colours.quick; highlight[end]=colours.pivot;
        drawBars(highlight);
        if(array[j]<pivot){
          i++; [array[i],array[j]]=[array[j],array[i]];
          let swapHL={}; swapHL[i]=colours.partition; swapHL[j]=colours.partition;
          drawBars(swapHL);
          await sleep(delay);
        }
        await sleep(delay);
      }
      [array[i+1],array[end]]=[array[end],array[i+1]];
      let finalHL={}; finalHL[i+1]=colours.pivot;
      drawBars(finalHL);
      await sleep(delay);
      return i+1;
    }
    function showComplexity(name,time,space){
      document.getElementById('complexity').textContent = name+" → Time: " + time+", Space: "+space;
    }
    async function runAlgo(){
      document.getElementById('runBtn').disabled=true;
      let v = document.getElementById('algo').value;
      if(v=="bubble") await bubbleSort();
      else if(v=="selection") await selectionSort();
      else if(v=="insertion") await insertionSort();
      else if(v=="merge"){ await mergeSort(); drawBars({},Array.from(Array(array.length).keys())); showComplexity("Merge Sort","O(n log n)","O(n)"); }
      else if(v=="quick"){ await quickSort(); drawBars({},Array.from(Array(array.length).keys())); showComplexity("Quick Sort","O(n log n)","O(log n)"); }
      document.getElementById('runBtn').disabled=false;
    }
    document.getElementById('speed').addEventListener('input',function(){
      delay = parseInt(this.value);
      document.getElementById('speedValue').innerText = delay<=60?"Fast":(delay>=220?"Slow":"Medium");
    });
    document.getElementById('runBtn').onclick = runAlgo;
    document.getElementById('genBtn').onclick = generateArray;
    
    const botAnswers = {
      "bubble": "Bubble Sort: Compares adjacent elements, swapping them if out of order. Best for small arrays. Time: O(n²), Space: O(1).",
      "selection": "Selection Sort: Selects the smallest element, moves it to the front. Simple but inefficient for large arrays. Time: O(n²), Space: O(1).",
      "insertion": "Insertion Sort: Builds sorted array by inserting elements. Efficient for almost sorted arrays. Time: O(n²), Space: O(1).",
      "merge": "Merge Sort: Divides array, then merges sorted halves. Efficient for large arrays. Time: O(n log n), Space: O(n).",
      "quick": "Quick Sort: Uses a pivot, partitions array into two parts, sorts recursively. Quick for most cases. Time: O(n log n), Space: O(log n).",
      "pivot": "Pivot is a special element in QuickSort used as the reference for partitioning the array.",
      "partition": "Partition refers to dividing the array into two sections, usually around a pivot in Quick Sort."
    };
    function sendMessage(){
      let input = document.getElementById('chatInput').value.trim().toLowerCase();
      if(!input) return;
      let userDiv=document.createElement('div'); userDiv.className="chatuser"; userDiv.innerText=input; document.getElementById('chatbot').appendChild(userDiv);
      let out="I'm not sure, try asking about: Bubble, Selection, Merge, Quick, Insertion Sort, Pivot or Partition.";
      Object.keys(botAnswers).forEach(key=>{
        if(input.includes(key)) out=botAnswers[key];
      });
      let botDiv=document.createElement('div'); botDiv.className="chatbotmsg"; botDiv.innerText=out; document.getElementById('chatbot').appendChild(botDiv);
      document.getElementById('chatbot').scrollTop = document.getElementById('chatbot').scrollHeight;
      document.getElementById('chatInput').value='';
    }
    document.getElementById('sendBtn').onclick = sendMessage;
    document.getElementById('chatInput').addEventListener('keydown', function(e){if(e.key=="Enter") sendMessage();});
    generateArray();
  </script>
</body>
</html>
